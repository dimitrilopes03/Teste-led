<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Iluminação IoT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- BIBLIOTECA MQTT CORRETA -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js" type="text/javascript"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .bg-lamp-off {
            background-color: #1a2a4a;
        }
        .bg-lamp-on {
            background-color: #e0f2fe;
        }

        .text-adaptive-title {
            transition: color 0.8s ease;
        }
        .bg-lamp-off .text-adaptive-title { color: #f8fafc; }
        .bg-lamp-on .text-adaptive-title { color: #0f172a; }

        .text-adaptive-sub {
            transition: color 0.8s ease;
        }
        .bg-lamp-off .text-adaptive-sub { color: #94a3b8; }
        .bg-lamp-on .text-adaptive-sub { color: #475569; }

        .glow-active {
            box-shadow: 0 0 40px 10px rgba(253, 224, 71, 0.6), 
                        0 0 70px 25px rgba(249, 115, 22, 0.4);
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; box-shadow: 0 0 50px 15px rgba(253, 224, 71, 0.7), 0 0 80px 30px rgba(249, 115, 22, 0.5); }
        }

        @keyframes pulse-status {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .pulse-anim {
            animation: pulse-status 1.5s infinite ease-in-out;
        }

        .btn-on.active {
            background-color: #22c55e !important;
            border-color: #16a34a !important;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3) !important;
        }
        .btn-off.active {
            background-color: #ef4444 !important;
            border-color: #dc2626 !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3) !important;
        }

        .log-area {
            max-height: 80px;
            overflow-y: auto;
            font-size: 11px;
        }
        .log-area p {
            margin: 2px 0;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body class="bg-lamp-off min-h-screen flex flex-col p-6 transition-all duration-1000">

    <!-- CABEÇALHO -->
    <header class="w-full max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 pt-4">
        <div>
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-adaptive-title">
                💡 Central de Iluminação IoT
            </h1>
            <p class="text-sm font-medium tracking-wide mt-1 text-adaptive-sub uppercase">
                Controle de Hardware — Portas 8, 9, 10 e 13
            </p>
        </div>

        <div class="flex items-center gap-3">
            <div id="status-pill" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900/40 border border-slate-700/30 backdrop-blur-md transition-all duration-500">
                <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
                <span id="status-text" class="text-xs font-semibold uppercase tracking-wider text-slate-200">
                    Desconectado
                </span>
            </div>
        </div>
    </header>

    <!-- ÁREA CENTRAL: 4 LEDS -->
    <main class="flex-grow flex flex-col items-center justify-center my-8 w-full">
        <div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <!-- LED 8 -->
            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20 shadow-2xl flex flex-col items-center justify-center transition-all duration-700">
                <div class="relative w-48 h-48 flex flex-col items-center justify-center mb-6">
                    <div id="led-virtual-8" class="w-32 h-32 rounded-full bg-slate-700/40 border border-white/10 flex items-center justify-center transition-all duration-700 ease-out">
                        <svg xmlns="http://www.w3.org/2000/svg" id="lamp-icon-8" class="w-16 h-16 text-slate-500/60 transition-colors duration-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v3m0 0h.01m-0.01 0H12m0-3a3 3 0 003-3V9a3 3 0 10-6 0v6a3 3 0 003 3zm0-13.5V3m0 3.5a1.5 1.5 0 000 3M12 18a1.5 1.5 0 000-3m0 0a4.5 4.5 0 00-4.5-4.5m9 0a4.5 4.5 0 00-4.5 4.5" />
                        </svg>
                    </div>
                    <span id="led-status-text-8" class="absolute bottom-0 text-sm font-semibold tracking-wider text-adaptive-sub uppercase mt-4">
                        Inativo
                    </span>
                </div>
                <div class="w-full grid grid-cols-2 gap-3">
                    <button id="btn-on-8" class="btn-on py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-emerald-600 border border-emerald-500 hover:bg-emerald-500 transition-all duration-300">
                        Ligar
                    </button>
                    <button id="btn-off-8" class="btn-off py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-rose-600 border border-rose-500 hover:bg-rose-500 transition-all duration-300">
                        Desligar
                    </button>
                </div>
                <p class="text-xs text-adaptive-sub opacity-60 mt-4 text-center font-mono">Porta 8</p>
            </div>

            <!-- LED 9 -->
            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20 shadow-2xl flex flex-col items-center justify-center transition-all duration-700">
                <div class="relative w-48 h-48 flex flex-col items-center justify-center mb-6">
                    <div id="led-virtual-9" class="w-32 h-32 rounded-full bg-slate-700/40 border border-white/10 flex items-center justify-center transition-all duration-700 ease-out">
                        <svg xmlns="http://www.w3.org/2000/svg" id="lamp-icon-9" class="w-16 h-16 text-slate-500/60 transition-colors duration-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v3m0 0h.01m-0.01 0H12m0-3a3 3 0 003-3V9a3 3 0 10-6 0v6a3 3 0 003 3zm0-13.5V3m0 3.5a1.5 1.5 0 000 3M12 18a1.5 1.5 0 000-3m0 0a4.5 4.5 0 00-4.5-4.5m9 0a4.5 4.5 0 00-4.5 4.5" />
                        </svg>
                    </div>
                    <span id="led-status-text-9" class="absolute bottom-0 text-sm font-semibold tracking-wider text-adaptive-sub uppercase mt-4">
                        Inativo
                    </span>
                </div>
                <div class="w-full grid grid-cols-2 gap-3">
                    <button id="btn-on-9" class="btn-on py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-emerald-600 border border-emerald-500 hover:bg-emerald-500 transition-all duration-300">
                        Ligar
                    </button>
                    <button id="btn-off-9" class="btn-off py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-rose-600 border border-rose-500 hover:bg-rose-500 transition-all duration-300">
                        Desligar
                    </button>
                </div>
                <p class="text-xs text-adaptive-sub opacity-60 mt-4 text-center font-mono">Porta 9</p>
            </div>

            <!-- LED 10 -->
            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20 shadow-2xl flex flex-col items-center justify-center transition-all duration-700">
                <div class="relative w-48 h-48 flex flex-col items-center justify-center mb-6">
                    <div id="led-virtual-10" class="w-32 h-32 rounded-full bg-slate-700/40 border border-white/10 flex items-center justify-center transition-all duration-700 ease-out">
                        <svg xmlns="http://www.w3.org/2000/svg" id="lamp-icon-10" class="w-16 h-16 text-slate-500/60 transition-colors duration-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v3m0 0h.01m-0.01 0H12m0-3a3 3 0 003-3V9a3 3 0 10-6 0v6a3 3 0 003 3zm0-13.5V3m0 3.5a1.5 1.5 0 000 3M12 18a1.5 1.5 0 000-3m0 0a4.5 4.5 0 00-4.5-4.5m9 0a4.5 4.5 0 00-4.5 4.5" />
                        </svg>
                    </div>
                    <span id="led-status-text-10" class="absolute bottom-0 text-sm font-semibold tracking-wider text-adaptive-sub uppercase mt-4">
                        Inativo
                    </span>
                </div>
                <div class="w-full grid grid-cols-2 gap-3">
                    <button id="btn-on-10" class="btn-on py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-emerald-600 border border-emerald-500 hover:bg-emerald-500 transition-all duration-300">
                        Ligar
                    </button>
                    <button id="btn-off-10" class="btn-off py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-rose-600 border border-rose-500 hover:bg-rose-500 transition-all duration-300">
                        Desligar
                    </button>
                </div>
                <p class="text-xs text-adaptive-sub opacity-60 mt-4 text-center font-mono">Porta 10</p>
            </div>

            <!-- LED 13 -->
            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20 shadow-2xl flex flex-col items-center justify-center transition-all duration-700">
                <div class="relative w-48 h-48 flex flex-col items-center justify-center mb-6">
                    <div id="led-virtual-13" class="w-32 h-32 rounded-full bg-slate-700/40 border border-white/10 flex items-center justify-center transition-all duration-700 ease-out">
                        <svg xmlns="http://www.w3.org/2000/svg" id="lamp-icon-13" class="w-16 h-16 text-slate-500/60 transition-colors duration-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v3m0 0h.01m-0.01 0H12m0-3a3 3 0 003-3V9a3 3 0 10-6 0v6a3 3 0 003 3zm0-13.5V3m0 3.5a1.5 1.5 0 000 3M12 18a1.5 1.5 0 000-3m0 0a4.5 4.5 0 00-4.5-4.5m9 0a4.5 4.5 0 00-4.5 4.5" />
                        </svg>
                    </div>
                    <span id="led-status-text-13" class="absolute bottom-0 text-sm font-semibold tracking-wider text-adaptive-sub uppercase mt-4">
                        Inativo
                    </span>
                </div>
                <div class="w-full grid grid-cols-2 gap-3">
                    <button id="btn-on-13" class="btn-on py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-emerald-600 border border-emerald-500 hover:bg-emerald-500 transition-all duration-300">
                        Ligar
                    </button>
                    <button id="btn-off-13" class="btn-off py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-rose-600 border border-rose-500 hover:bg-rose-500 transition-all duration-300">
                        Desligar
                    </button>
                </div>
                <p class="text-xs text-adaptive-sub opacity-60 mt-4 text-center font-mono">Porta 13</p>
            </div>

        </div>

        <!-- BOTÕES GERAIS -->
        <div class="w-full max-w-6xl grid grid-cols-2 gap-4 mt-8">
            <button id="btn-all-on" class="py-4 rounded-2xl font-bold uppercase text-sm tracking-widest text-white bg-emerald-600 border border-emerald-500 hover:bg-emerald-500 transition-all duration-300">
                💡 Ligar Todos
            </button>
            <button id="btn-all-off" class="py-4 rounded-2xl font-bold uppercase text-sm tracking-widest text-white bg-rose-600 border border-rose-500 hover:bg-rose-500 transition-all duration-300">
                ⚡ Desligar Todos
            </button>
        </div>

        <!-- LOG DE MENSAGENS -->
        <div class="w-full max-w-6xl mt-6">
            <div class="bg-black/30 backdrop-blur-xl rounded-2xl p-4 border border-white/10">
                <p class="text-xs text-adaptive-sub opacity-60 mb-2">📋 LOG DO SISTEMA</p>
                <div id="log-area" class="log-area text-xs text-adaptive-sub opacity-80">
                    <p>🔄 Aguardando conexão...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full text-center pb-4">
        <p class="text-xs text-adaptive-sub opacity-60">
            <span id="footer-debug" class="font-mono text-[11px]">Sistema inicializado</span>
        </p>
    </footer>

    <!-- ========================================== -->
    <!-- JAVASCRIPT PRINCIPAL -->
    <!-- ========================================== -->
    <script>
        (function() {
            'use strict';

            // ==========================================
            // CONFIGURAÇÕES
            // ==========================================
            const PORTS = [8, 9, 10, 13];
            const TOPICO_PADRAO = 'led';
            const BROKER = 'broker.hivemq.com';
            const PORTA = 8884;

            // ==========================================
            // ESTADO
            // ==========================================
            let client = null;
            let conectado = false;
            let topicoAtual = localStorage.getItem('mqtt_topic') || TOPICO_PADRAO;
            let ledStates = {8: 0, 9: 0, 10: 0, 13: 0};
            let tentativas = 0;
            let timeoutReconectar = null;

            // ==========================================
            // DOM REFS
            // ==========================================
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const statusPill = document.getElementById('status-pill');
            const logArea = document.getElementById('log-area');
            const footerDebug = document.getElementById('footer-debug');

            const ledVirtuals = {};
            const lampIcons = {};
            const ledStatusTexts = {};
            const btnOns = {};
            const btnOffs = {};

            PORTS.forEach(port => {
                ledVirtuals[port] = document.getElementById(`led-virtual-${port}`);
                lampIcons[port] = document.getElementById(`lamp-icon-${port}`);
                ledStatusTexts[port] = document.getElementById(`led-status-text-${port}`);
                btnOns[port] = document.getElementById(`btn-on-${port}`);
                btnOffs[port] = document.getElementById(`btn-off-${port}`);
            });

            const btnAllOn = document.getElementById('btn-all-on');
            const btnAllOff = document.getElementById('btn-all-off');

            // ==========================================
            // FUNÇÕES DE LOG
            // ==========================================
            function log(mensagem) {
                const time = new Date().toLocaleTimeString();
                const msg = `[${time}] ${mensagem}`;
                console.log(msg);
                
                const p = document.createElement('p');
                p.textContent = msg;
                logArea.appendChild(p);
                
                // Mantém apenas 20 mensagens
                while (logArea.children.length > 20) {
                    logArea.removeChild(logArea.firstChild);
                }
                logArea.scrollTop = logArea.scrollHeight;
                
                footerDebug.textContent = mensagem.substring(0, 80);
            }

            // ==========================================
            // FUNÇÕES DE STATUS
            // ==========================================
            function setStatus(modo, mensagem) {
                statusDot.className = 'w-2.5 h-2.5 rounded-full';
                
                if (modo === 'conectando') {
                    statusDot.classList.add('bg-yellow-400', 'pulse-anim');
                    statusText.textContent = mensagem || 'Conectando...';
                    statusText.className = 'text-xs font-semibold uppercase tracking-wider text-yellow-400';
                    statusPill.className = 'flex items-center gap-2 px-4 py-2 rounded-full bg-yellow-950/30 border border-yellow-500/20 backdrop-blur-md transition-all duration-500';
                } else if (modo === 'online') {
                    statusDot.classList.add('bg-emerald-400');
                    statusText.textContent = mensagem || 'Sistema Online';
                    statusText.className = 'text-xs font-semibold uppercase tracking-wider text-emerald-400';
                    statusPill.className = 'flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-950/30 border border-emerald-500/20 backdrop-blur-md transition-all duration-500';
                } else if (modo === 'offline') {
                    statusDot.classList.add('bg-red-500');
                    statusText.textContent = mensagem || 'Desconectado';
                    statusText.className = 'text-xs font-semibold uppercase tracking-wider text-red-400';
                    statusPill.className = 'flex items-center gap-2 px-4 py-2 rounded-full bg-red-950/30 border border-red-500/20 backdrop-blur-md transition-all duration-500';
                }
            }

            // ==========================================
            // FUNÇÕES DA INTERFACE
            // ==========================================
            function updateLedUI(port, state) {
                if (state === 1) {
                    ledVirtuals[port].className = 'w-32 h-32 rounded-full bg-yellow-300 flex items-center justify-center glow-active transition-all duration-700 ease-out';
                    lampIcons[port].setAttribute('class', 'w-16 h-16 text-orange-500 transition-colors duration-700');
                    ledStatusTexts[port].innerText = 'Ativo';
                    btnOns[port].classList.add('active');
                    btnOffs[port].classList.remove('active');
                } else {
                    ledVirtuals[port].className = 'w-32 h-32 rounded-full bg-slate-700/40 border border-white/10 flex items-center justify-center transition-all duration-700 ease-out';
                    lampIcons[port].setAttribute('class', 'w-16 h-16 text-slate-500/60 transition-colors duration-700');
                    ledStatusTexts[port].innerText = 'Inativo';
                    btnOns[port].classList.remove('active');
                    btnOffs[port].classList.add('active');
                }
                ledStates[port] = state;
            }

            function updateAllLEDs(state) {
                PORTS.forEach(port => updateLedUI(port, state));
            }

            // ==========================================
            // FUNÇÕES MQTT
            // ==========================================
            function publicar(comando) {
                if (!client || !conectado) {
                    log('❌ Não conectado ao MQTT');
                    return;
                }
                if (!topicoAtual || topicoAtual.length === 0) {
                    log('❌ Tópico inválido');
                    return;
                }
                try {
                    const msg = new Paho.MQTT.Message(comando);
                    msg.destinationName = topicoAtual;
                    msg.qos = 1;
                    client.send(msg);
                    log(`📤 Publicado: ${comando}`);
                } catch (e) {
                    log(`❌ Erro ao publicar: ${e}`);
                }
            }

            function conectarMQTT() {
                if (timeoutReconectar) {
                    clearTimeout(timeoutReconectar);
                    timeoutReconectar = null;
                }

                tentativas++;
                log(`🔄 Tentativa ${tentativas} de conexão...`);
                setStatus('conectando', `Conectando (${tentativas})...`);

                if (client) {
                    try { client.disconnect(); } catch(e) {}
                    client = null;
                }

                const clientId = 'web_' + Math.random().toString(16).substring(2, 10) + '_' + Date.now().toString(36);
                
                try {
                    client = new Paho.MQTT.Client(BROKER, PORTA, clientId);
                    client.useSSL = true;

                    client.onConnectionLost = function(response) {
                        conectado = false;
                        log('⚠️ Conexão perdida');
                        setStatus('offline', 'Conexão perdida');
                        
                        timeoutReconectar = setTimeout(function() {
                            if (!conectado) {
                                conectarMQTT();
                            }
                        }, 3000);
                    };

                    client.onMessageArrived = function(message) {
                        const payload = message.payloadString.trim();
                        log(`📨 Recebido: ${payload}`);
                        
                        // Processa comandos
                        if (payload.startsWith('LED')) {
                            const parts = payload.split('_');
                            if (parts.length === 2) {
                                const port = parseInt(parts[0].replace('LED', ''));
                                const acao = parts[1];
                                if (PORTS.includes(port)) {
                                    if (acao === 'ON') {
                                        updateLedUI(port, 1);
                                        log(`💡 LED${port} LIGADO`);
                                    } else if (acao === 'OFF') {
                                        updateLedUI(port, 0);
                                        log(`💡 LED${port} DESLIGADO`);
                                    }
                                }
                            }
                        } else if (payload === 'ALLON') {
                            updateAllLEDs(1);
                            log('💡 Todos LIGADOS');
                        } else if (payload === 'ALLOFF') {
                            updateAllLEDs(0);
                            log('💡 Todos DESLIGADOS');
                        }
                    };

                    const onConnect = function() {
                        conectado = true;
                        tentativas = 0;
                        log('✅ Conectado ao MQTT HiveMQ!');
                        setStatus('online', 'Sistema Online');
                        
                        client.subscribe(topicoAtual, {qos: 1});
                        log(`📥 Inscrito em: ${topicoAtual}`);
                    };

                    const onFailure = function(err) {
                        conectado = false;
                        log(`❌ Falha: ${err.errorMessage || 'Erro desconhecido'}`);
                        setStatus('offline', 'Falha na conexão');
                        
                        timeoutReconectar = setTimeout(function() {
                            if (!conectado) {
                                conectarMQTT();
                            }
                        }, 5000);
                    };

                    client.connect({
                        timeout: 10,
                        onSuccess: onConnect,
                        onFailure: onFailure,
                        useSSL: true,
                        cleanSession: true
                    });

                } catch (e) {
                    log(`❌ Erro ao criar cliente: ${e}`);
                    timeoutReconectar = setTimeout(function() {
                        if (!conectado) {
                            conectarMQTT();
                        }
                    }, 5000);
                }
            }

            // ==========================================
            // EVENTOS DOS BOTÕES
            // ==========================================
            PORTS.forEach(port => {
                btnOns[port].addEventListener('click', function() {
                    const cmd = `LED${port}_ON`;
                    publicar(cmd);
                    updateLedUI(port, 1);
                });
                
                btnOffs[port].addEventListener('click', function() {
                    const cmd = `LED${port}_OFF`;
                    publicar(cmd);
                    updateLedUI(port, 0);
                });
            });

            btnAllOn.addEventListener('click', function() {
                publicar('ALLON');
                updateAllLEDs(1);
            });

            btnAllOff.addEventListener('click', function() {
                publicar('ALLOFF');
                updateAllLEDs(0);
            });

            // ==========================================
            // INICIALIZAÇÃO
            // ==========================================
            function init() {
                log('🚀 Inicializando sistema...');
                setStatus('offline', 'Desconectado');
                
                // Estado inicial dos LEDs
                PORTS.forEach(port => {
                    updateLedUI(port, 0);
                });
                
                // Conecta ao MQTT
                conectarMQTT();
            }

            // Inicia quando a página carregar
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // Debug no console
            window.__iot = {
                client: client,
                conectado: conectado,
                topico: topicoAtual,
                publicar: publicar,
                reconectar: conectarMQTT,
                ledStates: ledStates
            };

        })();
    </script>
</body>
</html>
