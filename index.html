<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Iluminação IoT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/paho-mqtt@1.1.0/paho-mqtt.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; min-height: 100vh; }
        
        .glow-active {
            box-shadow: 0 0 40px 10px rgba(253, 224, 71, 0.6), 
                        0 0 70px 25px rgba(249, 115, 22, 0.4);
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        .pulse-anim { animation: pulse-status 1.5s infinite ease-in-out; }
        @keyframes pulse-status { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .btn-on.active { background-color: #22c55e !important; border-color: #16a34a !important; }
        .btn-off.active { background-color: #ef4444 !important; border-color: #dc2626 !important; }

        .log-area { max-height: 100px; overflow-y: auto; font-size: 11px; font-family: monospace; }
        .log-area p { margin: 2px 0; padding: 2px 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-area .erro { color: #ef4444; }
        .log-area .sucesso { color: #22c55e; }
        .log-area .info { color: #60a5fa; }
        .log-area .aviso { color: #fbbf24; }

        .card-led { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        .barra-intensidade {
            width: 100%;
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .barra-intensidade .preenchimento {
            height: 100%;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .label-intensidade {
            font-size: 10px;
            color: #94a3b8;
            text-align: center;
            margin-top: 4px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-6">

    <!-- CABEÇALHO -->
    <header class="w-full max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 pt-2">
        <div>
            <h1 class="text-2xl font-bold text-white">💡 Central IoT</h1>
            <p class="text-sm text-slate-400">Portas 8, 9, 10 (PWM) e 13</p>
        </div>
        <div class="flex items-center gap-3">
            <div id="status-pill" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-800/50 border border-slate-700/50">
                <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
                <span id="status-text" class="text-xs font-semibold uppercase tracking-wider text-slate-300">Desconectado</span>
            </div>
            <button id="btn-reconectar" class="px-3 py-2 text-xs bg-blue-600 hover:bg-blue-700 rounded-lg text-white transition">🔄 Reconectar</button>
        </div>
    </header>

    <!-- LEDS -->
    <main class="flex-grow flex flex-col items-center justify-center my-6 w-full">
        <div class="w-full max-w-6xl grid grid-cols-2 md:grid-cols-4 gap-4">
            
            <!-- LED 8 - Liga/Desliga -->
            <div class="card-led rounded-2xl p-6 flex flex-col items-center">
                <p class="text-xs text-slate-500 mb-2">🔘 Liga/Desliga</p>
                <div class="relative w-32 h-32 flex flex-col items-center justify-center mb-4">
                    <div id="led-virtual-8" class="w-24 h-24 rounded-full bg-slate-700/60 border border-white/10 flex items-center justify-center transition-all duration-500">
                        <svg id="lamp-icon-8" class="w-12 h-12 text-slate-500/60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18v3m0 0h.01m-0.01 0H12m0-3a3 3 0 003-3V9a3 3 0 10-6 0v6a3 3 0 003 3zm0-13.5V3m0 3.5a1.5 1.5 0 000 3M12 18a1.5 1.5 0 000-3m0 0a4.5 4.5 0 00-4.5-4.5m9 0a4.5 4.5 0 00-4.5 4.5" />
                        </svg>
                    </div>
                    <span id="led-status-text-8" class="absolute bottom-0 text-xs font-semibold text-slate-400 uppercase">Inativo</span>
                </div>
                <div class="w-full grid grid-cols-2 gap-2">
                    <button id="btn-on-8" class="btn-on py-2 rounded-xl font-semibold text-xs text-white bg-emerald-600 hover:bg-emerald-500 transition">Ligar</button>
                    <button id="btn-off-8" class="btn-off py-2 rounded-xl font-semibold text-xs text-white bg-rose-600 hover:bg-rose-500 transition">Desligar</button>
                </div>
                <p class="text-[10px] text-slate-500 mt-2">Porta 8</p>
            </div>

            <!-- LED 9 - Liga/Desliga -->
            <div class="card-led rounded-2xl p-6 flex flex-col items-center">
                <p class="text-xs text-slate-500 mb-2">🔘 Liga/Desliga</p>
                <div class="relative w-32 h-32 flex flex-col items-center justify-center mb-4">
                    <div id="led-virtual-9" class="w-24 h-24 rounded-full bg-slate-700/60 border border-white/10 flex items-center justify-center transition-all duration-500">
                        <svg id="lamp-icon-9" class="w-12 h-12 text-slate-500/60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18v3m0 0h.01m-0.01 0H12m0-3a3 3 0 003-3V9a3 3 0 10-6 0v6a3 3 0 003 3zm0-13.5V3m0 3.5a1.5 1.5 0 000 3M12 18a1.5 1.5 0 000-3m0 0a4.5 4.5 0 00-4.5-4.5m9 0a4.5 4.5 0 00-4.5 4.5" />
                        </svg>
                    </div>
                    <span id="led-status-text-9" class="absolute bottom-0 text-xs font-semibold text-slate-400 uppercase">Inativo</span>
                </div>
                <div class="w-full grid grid-cols-2 gap-2">
                    <button id="btn-on-9" class="btn-on py-2 rounded-xl font-semibold text-xs text-white bg-emerald-600 hover:bg-emerald-500 transition">Ligar</button>
                    <button id="btn-off-9" class="btn-off py-2 rounded-xl font-semibold text-xs text-white bg-rose-600 hover:bg-rose-500 transition">Desligar</button>
                </div>
                <p class="text-[10px] text-slate-500 mt-2">Porta 9</p>
            </div>

            <!-- LED 10 - Intensidade Variável (PWM) -->
            <div class="card-led rounded-2xl p-6 flex flex-col items-center">
                <p class="text-xs text-slate-500 mb-2">🎚️ Intensidade Variável</p>
                <div class="relative w-32 h-32 flex flex-col items-center justify-center mb-4">
                    <div id="led-virtual-10" class="w-24 h-24 rounded-full bg-slate-700/60 border border-white/10 flex items-center justify-center transition-all duration-500">
                        <svg id="lamp-icon-10" class="w-12 h-12 text-slate-500/60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18v3m0 0h.01m-0.01 0H12m0-3a3 3 0 003-3V9a3 3 0 10-6 0v6a3 3 0 003 3zm0-13.5V3m0 3.5a1.5 1.5 0 000 3M12 18a1.5 1.5 0 000-3m0 0a4.5 4.5 0 00-4.5-4.5m9 0a4.5 4.5 0 00-4.5 4.5" />
                        </svg>
                    </div>
                    <span id="led-status-text-10" class="absolute bottom-0 text-xs font-semibold text-slate-400 uppercase">0%</span>
                </div>
                <div class="w-full">
                    <div class="barra-intensidade">
                        <div id="barra-10" class="preenchimento" style="width: 0%;"></div>
                    </div>
                    <p id="label-intensidade-10" class="label-intensidade">Intensidade: 0%</p>
                </div>
                <p class="text-[10px] text-slate-500 mt-2">Porta 10 (PWM) - Potenciômetro A0</p>
            </div>

            <!-- LED 13 - Liga/Desliga -->
            <div class="card-led rounded-2xl p-6 flex flex-col items-center">
                <p class="text-xs text-slate-500 mb-2">🔘 Liga/Desliga</p>
                <div class="relative w-32 h-32 flex flex-col items-center justify-center mb-4">
                    <div id="led-virtual-13" class="w-24 h-24 rounded-full bg-slate-700/60 border border-white/10 flex items-center justify-center transition-all duration-500">
                        <svg id="lamp-icon-13" class="w-12 h-12 text-slate-500/60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18v3m0 0h.01m-0.01 0H12m0-3a3 3 0 003-3V9a3 3 0 10-6 0v6a3 3 0 003 3zm0-13.5V3m0 3.5a1.5 1.5 0 000 3M12 18a1.5 1.5 0 000-3m0 0a4.5 4.5 0 00-4.5-4.5m9 0a4.5 4.5 0 00-4.5 4.5" />
                        </svg>
                    </div>
                    <span id="led-status-text-13" class="absolute bottom-0 text-xs font-semibold text-slate-400 uppercase">Inativo</span>
                </div>
                <div class="w-full grid grid-cols-2 gap-2">
                    <button id="btn-on-13" class="btn-on py-2 rounded-xl font-semibold text-xs text-white bg-emerald-600 hover:bg-emerald-500 transition">Ligar</button>
                    <button id="btn-off-13" class="btn-off py-2 rounded-xl font-semibold text-xs text-white bg-rose-600 hover:bg-rose-500 transition">Desligar</button>
                </div>
                <p class="text-[10px] text-slate-500 mt-2">Porta 13</p>
            </div>

        </div>

        <!-- BOTÕES GERAIS -->
        <div class="w-full max-w-6xl grid grid-cols-2 gap-4 mt-6">
            <button id="btn-all-on" class="py-3 rounded-xl font-bold text-sm text-white bg-emerald-600 hover:bg-emerald-500 transition">💡 Ligar Todos</button>
            <button id="btn-all-off" class="py-3 rounded-xl font-bold text-sm text-white bg-rose-600 hover:bg-rose-500 transition">⚡ Desligar Todos</button>
        </div>

        <!-- LOG -->
        <div class="w-full max-w-6xl mt-6">
            <div class="bg-slate-900/50 rounded-xl p-4 border border-slate-800">
                <p class="text-xs text-slate-500 mb-2">📋 LOG</p>
                <div id="log-area" class="log-area text-xs">
                    <p class="info">🔄 Inicializando sistema...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ========================================== -->
    <!-- JAVASCRIPT -->
    <!-- ========================================== -->
    <script>
        (function() {
            'use strict';

            const PORTS_ONOFF = [8, 9, 13];
            const PORT_PWM = 10;
            const TOPICO = 'led';
            const TOPICO_POT = 'led/pot';
            const BROKER = 'broker.hivemq.com';
            const PORTA = 8884;

            let client = null;
            let conectado = false;
            let ledStates = {8: 0, 9: 0, 10: 0, 13: 0};
            let intensidade10 = 0;
            let tentativas = 0;

            // DOM
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const logArea = document.getElementById('log-area');
            const btnReconectar = document.getElementById('btn-reconectar');

            const ledVirtuals = {};
            const lampIcons = {};
            const ledStatusTexts = {};
            const btnOns = {};
            const btnOffs = {};

            PORTS_ONOFF.forEach(port => {
                ledVirtuals[port] = document.getElementById(`led-virtual-${port}`);
                lampIcons[port] = document.getElementById(`lamp-icon-${port}`);
                ledStatusTexts[port] = document.getElementById(`led-status-text-${port}`);
                btnOns[port] = document.getElementById(`btn-on-${port}`);
                btnOffs[port] = document.getElementById(`btn-off-${port}`);
            });

            // LED10 (PWM) - elementos específicos
            const ledVirtual10 = document.getElementById('led-virtual-10');
            const lampIcon10 = document.getElementById('lamp-icon-10');
            const ledStatus10 = document.getElementById('led-status-text-10');
            const barra10 = document.getElementById('barra-10');
            const label10 = document.getElementById('label-intensidade-10');

            const btnAllOn = document.getElementById('btn-all-on');
            const btnAllOff = document.getElementById('btn-all-off');

            // ==========================================
            // LOG
            // ==========================================
            function log(mensagem, tipo) {
                const time = new Date().toLocaleTimeString();
                const p = document.createElement('p');
                p.textContent = `[${time}] ${mensagem}`;
                if (tipo) p.className = tipo;
                logArea.appendChild(p);
                while (logArea.children.length > 30) logArea.removeChild(logArea.firstChild);
                logArea.scrollTop = logArea.scrollHeight;
                console.log(`[${time}] ${mensagem}`);
            }

            // ==========================================
            // STATUS
            // ==========================================
            function setStatus(modo, mensagem) {
                statusDot.className = 'w-2.5 h-2.5 rounded-full';
                if (modo === 'conectando') {
                    statusDot.classList.add('bg-yellow-400', 'pulse-anim');
                    statusText.textContent = mensagem || 'Conectando...';
                    statusText.className = 'text-xs font-semibold uppercase tracking-wider text-yellow-400';
                } else if (modo === 'online') {
                    statusDot.classList.add('bg-emerald-400');
                    statusText.textContent = mensagem || 'Online';
                    statusText.className = 'text-xs font-semibold uppercase tracking-wider text-emerald-400';
                } else if (modo === 'offline') {
                    statusDot.classList.add('bg-red-500');
                    statusText.textContent = mensagem || 'Desconectado';
                    statusText.className = 'text-xs font-semibold uppercase tracking-wider text-red-400';
                }
            }

            // ==========================================
            // LED UI - ON/OFF
            // ==========================================
            function updateLedUI(port, state) {
                if (state === 1) {
                    ledVirtuals[port].className = 'w-24 h-24 rounded-full bg-yellow-300 flex items-center justify-center glow-active transition-all duration-500';
                    lampIcons[port].setAttribute('class', 'w-12 h-12 text-orange-500 transition-colors duration-500');
                    ledStatusTexts[port].innerHTML = '<span class="text-emerald-400">● Ativo</span>';
                    btnOns[port].classList.add('active');
                    btnOffs[port].classList.remove('active');
                } else {
                    ledVirtuals[port].className = 'w-24 h-24 rounded-full bg-slate-700/60 border border-white/10 flex items-center justify-center transition-all duration-500';
                    lampIcons[port].setAttribute('class', 'w-12 h-12 text-slate-500/60 transition-colors duration-500');
                    ledStatusTexts[port].innerHTML = '<span class="text-slate-400">○ Inativo</span>';
                    btnOns[port].classList.remove('active');
                    btnOffs[port].classList.add('active');
                }
                ledStates[port] = state;
            }

            // ==========================================
            // LED UI - PWM (Intensidade)
            // ==========================================
            function updateLedPWM(intensidade) {
                // intensidade: 0 a 255
                const percentual = Math.round((intensidade / 255) * 100);
                intensidade10 = intensidade;
                ledStates[10] = intensidade > 0 ? 1 : 0;

                // Atualiza a lâmpada
                if (intensidade > 0) {
                    const brilho = Math.round((intensidade / 255) * 100);
                    // Amarelo com intensidade variável
                    ledVirtual10.className = `w-24 h-24 rounded-full flex items-center justify-center transition-all duration-500`;
                    ledVirtual10.style.background = `rgba(253, 224, 71, ${brilho/100})`;
                    ledVirtual10.style.boxShadow = `0 0 ${40 + brilho}px ${10 + brilho/5}px rgba(253, 224, 71, ${brilho/200})`;
                    lampIcon10.setAttribute('class', `w-12 h-12 text-orange-${Math.min(5, Math.floor(brilho/20)+1)}00 transition-colors duration-500`);
                    ledStatus10.innerHTML = `<span class="text-emerald-400">● ${percentual}%</span>`;
                } else {
                    ledVirtual10.className = 'w-24 h-24 rounded-full bg-slate-700/60 border border-white/10 flex items-center justify-center transition-all duration-500';
                    ledVirtual10.style.background = '';
                    ledVirtual10.style.boxShadow = '';
                    lampIcon10.setAttribute('class', 'w-12 h-12 text-slate-500/60 transition-colors duration-500');
                    ledStatus10.innerHTML = '<span class="text-slate-400">○ 0%</span>';
                }

                // Atualiza a barra
                barra10.style.width = percentual + '%';
                label10.textContent = `Intensidade: ${percentual}%`;
            }

            function updateAllLEDs(state) {
                PORTS_ONOFF.forEach(port => updateLedUI(port, state));
                if (state === 1) {
                    updateLedPWM(255);
                } else {
                    updateLedPWM(0);
                }
            }

            // ==========================================
            // MQTT
            // ==========================================
            function publicar(comando) {
                if (!client || !conectado) {
                    log('❌ Não conectado ao MQTT', 'erro');
                    return;
                }
                try {
                    const msg = new Paho.MQTT.Message(comando);
                    msg.destinationName = TOPICO;
                    msg.qos = 1;
                    client.send(msg);
                    log(`📤 Publicado: ${comando}`, 'info');
                } catch (e) {
                    log(`❌ Erro ao publicar: ${e}`, 'erro');
                }
            }

            function conectarMQTT() {
                tentativas++;
                log(`🔄 Tentativa ${tentativas}...`, 'info');
                setStatus('conectando', `Tentativa ${tentativas}`);

                if (client) {
                    try { client.disconnect(); } catch(e) {}
                    client = null;
                }

                const clientId = 'web_' + Math.random().toString(16).substring(2, 10);

                try {
                    client = new Paho.MQTT.Client(BROKER, PORTA, clientId);
                    client.useSSL = true;

                    client.onConnectionLost = function(response) {
                        conectado = false;
                        log('⚠️ Conexão perdida', 'aviso');
                        setStatus('offline', 'Desconectado
