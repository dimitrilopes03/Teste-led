<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Iluminação IoT</title>
    <!-- Tailwind CSS para estilização rápida e moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter para tipografia ultra-limpa -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Biblioteca Oficial Paho MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Cores de fundo dinâmicas e relaxantes baseadas no estado da lâmpada */
        .bg-lamp-off {
            background-color: #1a2a4a; /* Azul escuro noturno/relaxante */
        }
        .bg-lamp-on {
            background-color: #e0f2fe; /* Azul céu claro suave */
        }

        /* Cores de texto adaptativas para manter contraste perfeito */
        .text-adaptive-title {
            transition: color 0.8s ease;
        }
        .bg-lamp-off .text-adaptive-title { color: #f8fafc; }
        .bg-lamp-on .text-adaptive-title { color: #0f172a; }

        .text-adaptive-sub {
            transition: color 0.8s ease;
        }
        .bg-lamp-off .text-adaptive-sub { color: #94a3b8; }
        .bg-lamp-on .text-adaptive-sub { color: #475569; }

        /* Efeito de Brilho Neon para a Lâmpada Acesa */
        .glow-active {
            box-shadow: 0 0 40px 10px rgba(253, 224, 71, 0.6), 
                        0 0 70px 25px rgba(249, 115, 22, 0.4);
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; box-shadow: 0 0 50px 15px rgba(253, 224, 71, 0.7), 0 0 80px 30px rgba(249, 115, 22, 0.5); }
        }

        /* Animação do Status de Sincronização */
        @keyframes pulse-status {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .pulse-anim {
            animation: pulse-status 1.5s infinite ease-in-out;
        }

        /* Estilos para input e modal de configuração */
        input[type="text"] {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: inherit;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            outline: none;
        }
        .bg-lamp-on input[type="text"] {
            background-color: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.15);
            color: #0f172a;
        }
        .bg-lamp-on input[type="text"]:focus {
            background-color: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="bg-lamp-off min-h-screen flex flex-col justify-between p-6 transition-all duration-1000">

    <!-- CABEÇALHO -->

                <div class="w-full grid grid-cols-2 gap-3">

                    </button>
                    <button id="btn-off-10" disabled

    <!-- RODAPÉ -->

        <p class="text-xs text-adaptive-sub opacity-60">
            Tópicos: <span id="footer-topics" class="font-mono text-xs">8 | 9 | 10 | 13</span>
        </p>

    <!-- LOGICA DE HARDWARE E CONEXÃO MQTT -->
    <script>
        (function() {
            // --- DOM refs ---
            const statusPill = document.getElementById("status-pill");
            const statusDot = document.getElementById("status-dot");
            const statusText = document.getElementById("status-text");
            const configModal = document.getElementById("config-modal");
            const btnConfig = document.getElementById("btn-config");
            const btnCancel = document.getElementById("btn-cancel");
            const btnSaveTopics = document.getElementById("btn-save-topics");
            const footerTopics = document.getElementById("footer-topics");

            const topicInputs = {
                8: document.getElementById("topic-input-8"),
                9: document.getElementById("topic-input-9"),
                10: document.getElementById("topic-input-10"),
                13: document.getElementById("topic-input-13")
            };

            const ledVirtuals = {
                8: document.getElementById("led-virtual-8"),
                9: document.getElementById("led-virtual-9"),
                10: document.getElementById("led-virtual-10"),
                13: document.getElementById("led-virtual-13")
            };

            const lampIcons = {
                8: document.getElementById("lamp-icon-8"),
                9: document.getElementById("lamp-icon-9"),
                10: document.getElementById("lamp-icon-10"),
                13: document.getElementById("lamp-icon-13")
            };

            const ledStatusTexts = {
                8: document.getElementById("led-status-text-8"),
                9: document.getElementById("led-status-text-9"),
                10: document.getElementById("led-status-text-10"),
                13: document.getElementById("led-status-text-13")
            };

            const btnOns = {
                8: document.getElementById("btn-on-8"),
                9: document.getElementById("btn-on-9"),
                10: document.getElementById("btn-on-10"),
                13: document.getElementById("btn-on-13")
            };

            const btnOffs = {
                8: document.getElementById("btn-off-8"),
                9: document.getElementById("btn-off-9"),
                10: document.getElementById("btn-off-10"),
                13: document.getElementById("btn-off-13")
            };

            // --- estado interno ---
            const defaultTopics = {
                8: "esp32/arduino/porta8",
                9: "esp32/arduino/porta9",
                10: "esp32/arduino/porta10",
                13: "esp32/arduino/porta13"
            };

            // Carrega tópicos salvos do localStorage ou usa padrão
            let currentTopics = {
                8: localStorage.getItem("mqtt_topic_8") || defaultTopics[8],
                9: localStorage.getItem("mqtt_topic_9") || defaultTopics[9],
                10: localStorage.getItem("mqtt_topic_10") || defaultTopics[10],
                13: localStorage.getItem("mqtt_topic_13") || defaultTopics[13]
            };

            let client = null;
            let isConnected = false;
            let ledStates = { 8: 0, 9: 0, 10: 0, 13: 0 };

            // --- helpers UI ---
            function setStatus(mode, msg) {
                statusDot.className = "w-2.5 h-2.5 rounded-full";
                if (mode === 'sync') {
                    statusDot.classList.add('bg-amber-400', 'pulse-anim');
                    statusText.textContent = msg || 'Sincronizando...';
                    statusText.className = "text-xs font-semibold uppercase tracking-wider text-slate-200";
                    statusPill.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900/40 border border-slate-700/30 backdrop-blur-md transition-all duration-500";
                } else if (mode === 'online') {
                    statusDot.classList.add('bg-emerald-400');
                    statusText.textContent = msg || 'Sistema Online';
                    statusText.className = "text-xs font-semibold uppercase tracking-wider text-emerald-400";
                    statusPill.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-950/30 border border-emerald-500/20 backdrop-blur-md transition-all duration-500";
                } else if (mode === 'offline') {
                    statusDot.classList.add('bg-rose-500');
                    statusText.textContent = msg || 'Desconectado';
                    statusText.className = "text-xs font-semibold uppercase tracking-wider text-rose-500";
                    statusPill.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-rose-950/30 border border-rose-500/20 backdrop-blur-md transition-all duration-500";
                }
            }

            function setButtonsEnabled(enabled) {
                [8, 9, 10, 13].forEach(port => {
                    if (enabled) {
                        btnOns[port].disabled = false;
                        btnOffs[port].disabled = false;
                        btnOns[port].className = "py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-emerald-600 border border-emerald-500 hover:bg-emerald-500 cursor-pointer shadow-lg shadow-emerald-900/20 transition-all duration-300 active:scale-95 focus:outline-none";
                        btnOffs[port].className = "py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-rose-600 border border-rose-500 hover:bg-rose-500 cursor-pointer shadow-lg shadow-rose-900/20 transition-all duration-300 active:scale-95 focus:outline-none";
                    } else {
                        btnOns[port].disabled = true;
                        btnOffs[port].disabled = true;
                        btnOns[port].className = "py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-slate-700/40 border border-white/5 cursor-not-allowed opacity-40 transition-all duration-300 active:scale-95 focus:outline-none";
                        btnOffs[port].className = "py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-slate-700/40 border border-white/5 cursor-not-allowed opacity-40 transition-all duration-300 active:scale-95 focus:outline-none";
                    }
                });
            }

            function updateLedUI(port, state) {
                if (state === 1) {
                    ledVirtuals[port].className = "w-32 h-32 rounded-full bg-yellow-300 flex items-center justify-center glow-active transition-all duration-700 ease-out";
                    lampIcons[port].setAttribute("class", "w-16 h-16 text-orange-500 transition-colors duration-700");
                    ledStatusTexts[port].innerText = "Ativo";
                } else {
                    ledVirtuals[port].className = "w-32 h-32 rounded-full bg-slate-700/40 border border-white/10 flex items-center justify-center transition-all duration-700 ease-out";
                    lampIcons[port].setAttribute("class", "w-16 h-16 text-slate-500/60 transition-colors duration-700");
                    ledStatusTexts[port].innerText = "Inativo";
                }
            }

            // --- MQTT lógica ---
            function connectMqtt() {
                if (client) {
                    try { client.disconnect(); } catch (_) {}
                    client = null;
                }

                const clientId = 'web_' + Math.random().toString(16).substring(2, 10) + '_' + Date.now().toString(36);
                const broker = 'broker.hivemq.com';
                const port = 8884;
                
                client = new Paho.MQTT.Client(broker, port, clientId);
                client.useSSL = true;

                const onConnect = () => {
                    isConnected = true;
                    setStatus('online', 'Sistema Online');
                    setButtonsEnabled(true);
                    
                    // inscreve em todos os tópicos
                    [8, 9, 10, 13].forEach(portNum => {
                        const topic = currentTopics[portNum];
                        if (topic && topic.length > 0) {
                            client.subscribe(topic, { qos: 0 });
                            console.log('[MQTT] inscrito em:', topic);
                        }
                    });
                };

                const onFailure = (err) => {
                    isConnected = false;
                    setStatus('offline', 'Falha na conexão');
                    setButtonsEnabled(false);
                    console.warn('[MQTT] erro conexão:', err);
                    setTimeout(() => {
                        if (!isConnected) {
                            connectMqtt();
                        }
                    }, 5000);
                };

                const onMessageArrived = (message) => {
                    const payload = message.payloadString.trim();
                    const topic = message.destinationName;
                    console.log(`[MQTT] mensagem em ${topic}:`, payload);

                    // identifica qual porta comparando com os tópicos atuais
                    let port = null;
                    [8, 9, 10, 13].forEach(portNum => {
                        if (topic === currentTopics[portNum]) {
                            port = portNum;
                        }
                    });

                    if (port) {
                        if (payload === '1') {
                            ledStates[port] = 1;
                            updateLedUI(port, 1);
                        } else if (payload === '0') {
                            ledStates[port] = 0;
                            updateLedUI(port, 0);
                        }
                    }
                };

                client.onConnectionLost = (response) => {
                    isConnected = false;
                    setStatus('offline', 'Conexão perdida');
                    setButtonsEnabled(false);
                    console.warn('[MQTT] conexão perdida', response);
                    setTimeout(() => {
                        if (!isConnected) {
                            connectMqtt();
                        }
                    }, 4000);
                };

                client.onMessageArrived = onMessageArrived;

                const options = {
                    timeout: 10,
                    onSuccess: onConnect,
                    onFailure: onFailure,
                    useSSL: true,
                };

                client.connect(options);
            }

            // --- desinscrever e assinar novo tópico ---
            function switchTopics(newTopics) {
                if (!client || !isConnected) return;

                [8, 9, 10, 13].forEach(port => {
                    const oldTopic = currentTopics[port];
                    const newTopic = newTopics[port];

                    if (newTopic && newTopic.length > 0 && oldTopic !== newTopic) {
                        try {
                            if (oldTopic && oldTopic.length > 0) {
                                client.unsubscribe(oldTopic, { qos: 0 });
                                console.log('[MQTT] desinscrito de:', oldTopic);
                            }
                            client.subscribe(newTopic, { qos: 0 });
                            console.log('[MQTT] inscrito em:', newTopic);
                        } catch (e) {
                            console.warn('[MQTT] erro ao trocar inscrição', e);
                        }
                    }
                });

                currentTopics = { ...newTopics };
                updateFooterTopics();
                saveTopicsToLocalStorage();
            }

            // --- salvar tópicos no localStorage ---
            function saveTopicsToLocalStorage() {
                [8, 9, 10, 13].forEach(port => {
                    localStorage.setItem(`mqtt_topic_${port}`, currentTopics[port]);
                });
                console.log('[localStorage] tópicos salvos:', currentTopics);
            }

            // --- publicar comando ---
            function publishCommand(port, value) {
                if (!client || !isConnected) {
                    console.warn('[MQTT] não conectado');
                    return;
                }
                const topic = currentTopics[port];
                if (!topic || topic.length === 0) {
                    console.warn('[MQTT] tópico inválido');
                    return;
                }
                const msg = new Paho.MQTT.Message(String(value));
                msg.destinationName = topic;
                msg.qos = 0;
                client.send(msg);
                console.log(`[MQTT] publicado '${value}' em ${topic}`);
            }

            function updateFooterTopics() {
                footerTopics.innerText = `${currentTopics[8]} | ${currentTopics[9]} | ${currentTopics[10]} | ${currentTopics[13]}`;
            }

            // --- EVENT LISTENERS DO MODAL ---
            btnConfig.addEventListener('click', () => {
                [8, 9, 10, 13].forEach(port => {
                    topicInputs[port].value = currentTopics[port];
                });
                configModal.classList.remove('hidden');
            });

            btnCancel.addEventListener('click', () => {
                configModal.classList.add('hidden');
            });

            function saveTopics() {
                const newTopics = {
                    8: topicInputs[8].value.trim(),
                    9: topicInputs[9].value.trim(),
                    10: topicInputs[10].value.trim(),
                    13: topicInputs[13].value.trim()
                };
                
                let valid = true;
                for (let port of [8, 9, 10, 13]) {
                    if (!newTopics[port]) {
                        alert(`Porta ${port}: Digite um tópico válido.`);
                        valid = false;
                        break;
                    }
                }

                if (!valid) return;

                if (isConnected && client) {
                    switchTopics(newTopics);
                } else {
                    currentTopics = { ...newTopics };
                    updateFooterTopics();
                    saveTopicsToLocalStorage();
                }

                configModal.classList.add('hidden');
                console.log(`Tópicos atualizado para:`, currentTopics);
            }

            btnSaveTopics.addEventListener('click', saveTopics);
            [topicInputs[8], topicInputs[9], topicInputs[10], topicInputs[13]].forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') saveTopics();
                });
            });

            configModal.addEventListener('click', (e) => {
                if (e.target === configModal) {
                    configModal.classList.add('hidden');
                }
            });

            // --- eventos dos botões de ação ---
            [8, 9, 10, 13].forEach(port => {
                btnOns[port].addEventListener('click', () => publishCommand(port, "1"));
                btnOffs[port].addEventListener('click', () => publishCommand(port, "0"));
            });

            // --- inicialização ---
            function init() {
                setStatus('sync', 'Sincronizando...');
                setButtonsEnabled(false);
                [8, 9, 10, 13].forEach(port => {
                    updateLedUI(port, 0);
                    ledStates[port] = 0;
                });
                updateFooterTopics();
                connectMqtt();
            }

            init();

            // expor para debug (opcional)
            window.__iot = { client, connectMqtt, publishCommand, currentTopics, saveTopicsToLocalStorage };
        })();
    </script>
</body>
</html>
