<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Iluminação IoT</title>
    <!-- Tailwind CSS para estilização rápida e moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter para tipografia ultra-limpa -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Biblioteca Oficial Paho MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Cores de fundo dinâmicas e relaxantes baseadas no estado da lâmpada */
        .bg-lamp-off {
            background-color: #1a2a4a; /* Azul escuro noturno/relaxante */
        }
        .bg-lamp-on {
            background-color: #e0f2fe; /* Azul céu claro suave */
        }

        /* Cores de texto adaptativas para manter contraste perfeito */
        .text-adaptive-title {
            transition: color 0.8s ease;
        }
        .bg-lamp-off .text-adaptive-title { color: #f8fafc; }
        .bg-lamp-on .text-adaptive-title { color: #0f172a; }

        .text-adaptive-sub {
            transition: color 0.8s ease;
        }
        .bg-lamp-off .text-adaptive-sub { color: #94a3b8; }
        .bg-lamp-on .text-adaptive-sub { color: #475569; }

        /* Efeito de Brilho Neon para a Lâmpada Acesa */
        .glow-active {
            box-shadow: 0 0 40px 10px rgba(253, 224, 71, 0.6), 
                        0 0 70px 25px rgba(249, 115, 22, 0.4);
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; box-shadow: 0 0 50px 15px rgba(253, 224, 71, 0.7), 0 0 80px 30px rgba(249, 115, 22, 0.5); }
        }

        /* Animação do Status de Sincronização */
        @keyframes pulse-status {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .pulse-anim {
            animation: pulse-status 1.5s infinite ease-in-out;
        }

        /* Estilos para input e modal de configuração */
        input[type="text"] {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: inherit;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            outline: none;
        }
        .bg-lamp-on input[type="text"] {
            background-color: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.15);
            color: #0f172a;
        }
        .bg-lamp-on input[type="text"]:focus {
            background-color: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

    <!-- LOGICA DE HARDWARE E CONEXÃO MQTT -->
    <script>
        const PORTS = [8, 9, 10, 13];
        const DEFAULT_TOPICS = {
            8: "led/porta8",
            9: "led/porta9",
            10: "led/porta10",
            13: "led/porta13"
        };

        // DOM references
        const statusPill = document.getElementById("status-pill");
        const statusDot = document.getElementById("status-dot");
        const statusText = document.getElementById("status-text");
        const configModal = document.getElementById("config-modal");
        const btnConfig = document.getElementById("btn-config");
        const btnCancel = document.getElementById("btn-cancel");
        const btnSaveTopics = document.getElementById("btn-save-topics");
        const footerDebug = document.getElementById("footer-debug");

        const topicInputs = {};
        const ledVirtuals = {};
        const lampIcons = {};
        const ledStatusTexts = {};
        const btnOns = {};
        const btnOffs = {};
        const topicDisplays = {};

        PORTS.forEach(port => {
            topicInputs[port] = document.getElementById(`topic-input-${port}`);
            ledVirtuals[port] = document.getElementById(`led-virtual-${port}`);
            lampIcons[port] = document.getElementById(`lamp-icon-${port}`);
            ledStatusTexts[port] = document.getElementById(`led-status-text-${port}`);
            btnOns[port] = document.getElementById(`btn-on-${port}`);
            btnOffs[port] = document.getElementById(`btn-off-${port}`);
            topicDisplays[port] = document.getElementById(`topic-display-${port}`);
        });

        // Estado
        let currentTopics = {};
        let client = null;
        let isConnected = false;
        let ledStates = {};

        // Carrega tópicos salvos
        function loadTopics() {
            PORTS.forEach(port => {
                const saved = localStorage.getItem(`mqtt_topic_${port}`);
                currentTopics[port] = saved || DEFAULT_TOPICS[port];
                ledStates[port] = 0;
                topicDisplays[port].textContent = currentTopics[port];
            });
            console.log("✅ Tópicos carregados:", currentTopics);
        }

        // Log com timestamp
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            console.log(`[${time}] ${msg}`);
            footerDebug.textContent = `${msg.substring(0, 80)}...`;
        }

        // Salva tópicos
        function saveTopicsToLocalStorage() {
            PORTS.forEach(port => {
                localStorage.setItem(`mqtt_topic_${port}`, currentTopics[port]);
            });
            console.log("💾 Tópicos salvos no localStorage:", currentTopics);
        }

        // Status visual
        function setStatus(mode, msg) {
            statusDot.className = "w-2.5 h-2.5 rounded-full";
            if (mode === 'sync') {
                statusDot.classList.add('bg-amber-400', 'pulse-anim');
                statusText.textContent = msg || 'Sincronizando...';
                statusText.className = "text-xs font-semibold uppercase tracking-wider text-slate-200";
                statusPill.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900/40 border border-slate-700/30 backdrop-blur-md transition-all duration-500";
            } else if (mode === 'online') {
                statusDot.classList.add('bg-emerald-400');
                statusText.textContent = msg || 'Sistema Online';
                statusText.className = "text-xs font-semibold uppercase tracking-wider text-emerald-400";
                statusPill.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-950/30 border border-emerald-500/20 backdrop-blur-md transition-all duration-500";
            } else if (mode === 'offline') {
                statusDot.classList.add('bg-rose-500');
                statusText.textContent = msg || 'Desconectado';
                statusText.className = "text-xs font-semibold uppercase tracking-wider text-rose-500";
                statusPill.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-rose-950/30 border border-rose-500/20 backdrop-blur-md transition-all duration-500";
            }
        }

        function setButtonsEnabled(enabled) {
            PORTS.forEach(port => {
                if (enabled) {
                    btnOns[port].disabled = false;
                    btnOffs[port].disabled = false;
                    btnOns[port].className = "py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-emerald-600 border border-emerald-500 hover:bg-emerald-500 cursor-pointer shadow-lg shadow-emerald-500/20 transition-all duration-300";
                    btnOffs[port].className = "py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-rose-600 border border-rose-500 hover:bg-rose-500 cursor-pointer shadow-lg shadow-rose-500/20 transition-all duration-300";
                } else {
                    btnOns[port].disabled = true;
                    btnOffs[port].disabled = true;
                    btnOns[port].className = "py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-slate-700/40 border border-white/5 cursor-not-allowed opacity-40 transition-all duration-300";
                    btnOffs[port].className = "py-3 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-slate-700/40 border border-white/5 cursor-not-allowed opacity-40 transition-all duration-300";
                }
            });
        }

        function updateLedUI(port, state) {
            console.log(`🔄 Atualizando LED porta ${port} para estado: ${state}`);
            if (state === 1) {
                ledVirtuals[port].className = "w-32 h-32 rounded-full bg-yellow-300 flex items-center justify-center glow-active transition-all duration-700 ease-out";
                lampIcons[port].setAttribute("class", "w-16 h-16 text-orange-500 transition-colors duration-700");
                ledStatusTexts[port].innerText = "Ativo";
            } else {
                ledVirtuals[port].className = "w-32 h-32 rounded-full bg-slate-700/40 border border-white/10 flex items-center justify-center transition-all duration-700 ease-out";
                lampIcons[port].setAttribute("class", "w-16 h-16 text-slate-500/60 transition-colors duration-700");
                ledStatusTexts[port].innerText = "Inativo";
            }
            ledStates[port] = state;
        }

        // MQTT Connection
        function connectMqtt() {
            log("🔌 Conectando ao MQTT...");
            
            if (client) {
                try { client.disconnect(); } catch (_) {}
                client = null;
            }

            const clientId = 'web_' + Math.random().toString(16).substring(2, 10) + '_' + Date.now().toString(36);
            const broker = 'broker.hivemq.com';
            const port = 8884;
            
            client = new Paho.MQTT.Client(broker, port, clientId);
            client.useSSL = true;

            const onConnect = () => {
                isConnected = true;
                log("✅ Conectado ao MQTT HiveMQ!");
                setStatus('online', 'Sistema Online');
                setButtonsEnabled(true);
                
                // Subscribe to ALL topics
                PORTS.forEach(portNum => {
                    const topic = currentTopics[portNum];
                    if (topic && topic.length > 0) {
                        client.subscribe(topic, { qos: 1 });
                        log(`📥 Inscrito em: ${topic}`);
                    }
                });
            };

            const onFailure = (err) => {
                isConnected = false;
                log("❌ Falha na conexão MQTT");
                setStatus('offline', 'Falha na conexão');
                setButtonsEnabled(false);
                console.error('[MQTT] Erro:', err);
                setTimeout(() => {
                    if (!isConnected) {
                        log("🔄 Tentando reconectar...");
                        connectMqtt();
                    }
                }, 5000);
            };

            const onMessageArrived = (message) => {
                const payload = message.payloadString.trim();
                const topic = message.destinationName;
                log(`📨 Mensagem recebida | Tópico: ${topic} | Payload: ${payload}`);

                // Find which port this message belongs to
                let matchedPort = null;
                PORTS.forEach(portNum => {
                    if (topic === currentTopics[portNum]) {
                        matchedPort = portNum;
                    }
                });

                if (matchedPort !== null) {
                    console.log(`✅ Tópico corresponde à PORTA ${matchedPort}`);
                    if (payload === '1' || payload === '1') {
                        updateLedUI(matchedPort, 1);
                    } else if (payload === '0' || payload === '0') {
                        updateLedUI(matchedPort, 0);
                    } else {
                        console.warn(`⚠️ Payload inválido: ${payload}`);
                    }
                } else {
                    console.warn(`❌ Tópico ${topic} não corresponde a nenhuma porta!`);
                    console.table(currentTopics);
                }
            };

            client.onConnectionLost = (response) => {
                isConnected = false;
                log("⚠️ Conexão MQTT perdida");
                setStatus('offline', 'Conexão perdida');
                setButtonsEnabled(false);
                setTimeout(() => {
                    if (!isConnected) {
                        connectMqtt();
                    }
                }, 4000);
            };

            client.onMessageArrived = onMessageArrived;

            const options = {
                timeout: 10,
                onSuccess: onConnect,
                onFailure: onFailure,
                useSSL: true,
            };

            client.connect(options);
        }

        // Trocar tópicos e reinscrever
        function switchTopics(newTopics) {
            if (!client || !isConnected) {
                log("❌ MQTT não conectado, apenas salvando tópicos...");
                currentTopics = { ...newTopics };
                saveTopicsToLocalStorage();
                PORTS.forEach(port => {
                    topicDisplays[port].textContent = currentTopics[port];
                });
                return;
            }

            log("🔄 Trocando inscrições MQTT...");

            PORTS.forEach(port => {
                const oldTopic = currentTopics[port];
                const newTopic = newTopics[port];

                if (newTopic && newTopic.length > 0 && oldTopic !== newTopic) {
                    try {
                        if (oldTopic && oldTopic.length > 0) {
                            client.unsubscribe(oldTopic, { qos: 1 });
                            log(`📤 Desinscrito de: ${oldTopic}`);
                        }
                        client.subscribe(newTopic, { qos: 1 });
                        log(`📥 Inscrito em: ${newTopic}`);
                    } catch (e) {
                        console.error('[MQTT] Erro ao trocar:', e);
                    }
                }
            });

            currentTopics = { ...newTopics };
            saveTopicsToLocalStorage();
            PORTS.forEach(port => {
                topicDisplays[port].textContent = currentTopics[port];
            });
        }

        // Publicar comando
        function publishCommand(port, value) {
            if (!client || !isConnected) {
                log(`❌ Não conectado ao MQTT`);
                return;
            }
            const topic = currentTopics[port];
            if (!topic || topic.length === 0) {
                log(`❌ Tópico inválido para porta ${port}`);
                return;
            }
            const msg = new Paho.MQTT.Message(String(value));
            msg.destinationName = topic;
            msg.qos = 1;
            client.send(msg);
            log(`📤 Publicado '${value}' em porta ${port}: ${topic}`);
        }

        // Modal events
        btnConfig.addEventListener('click', () => {
            PORTS.forEach(port => {
                topicInputs[port].value = currentTopics[port];
            });
            configModal.classList.remove('hidden');
        });

        btnCancel.addEventListener('click', () => {
            configModal.classList.add('hidden');
        });

        function saveTopics() {
            const newTopics = {};
            let valid = true;
            
            PORTS.forEach(port => {
                const val = topicInputs[port].value.trim();
                if (!val) {
                    alert(`Porta ${port}: Digite um tópico válido.`);
                    valid = false;
                    return;
                }
                newTopics[port] = val;
            });

            if (!valid) return;

            switchTopics(newTopics);
            configModal.classList.add('hidden');
            log(`✅ Tópicos atualizados`);
        }

        btnSaveTopics.addEventListener('click', saveTopics);
        PORTS.forEach(port => {
            topicInputs[port].addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveTopics();
            });
        });

        configModal.addEventListener('click', (e) => {
            if (e.target === configModal) {
                configModal.classList.add('hidden');
            }
        });

        // Button events
        PORTS.forEach(port => {
            btnOns[port].addEventListener('click', () => publishCommand(port, "1"));
            btnOffs[port].addEventListener('click', () => publishCommand(port, "0"));
        });

        // Init
        function init() {
            setStatus('sync', 'Sincronizando...');
            setButtonsEnabled(false);
            loadTopics();
            PORTS.forEach(port => {
                updateLedUI(port, 0);
            });
            connectMqtt();
        }

        init();

        // Debug global
        window.__iot = {
            client,
            connectMqtt,
            publishCommand,
            currentTopics,
            log,
            refreshTopics: loadTopics
        };
    </script>
</body>
</html>
