<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Iluminação IoT</title>
    <!-- Tailwind CSS para estilização rápida e moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter para tipografia ultra-limpa -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Biblioteca Oficial Paho MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Cores de fundo dinâmicas e relaxantes baseadas no estado da lâmpada */
        .bg-lamp-off {
            background-color: #1a2a4a; /* Azul escuro noturno/relaxante */
        }
        .bg-lamp-on {
            background-color: #e0f2fe; /* Azul céu claro suave */
        }

        /* Cores de texto adaptativas para manter contraste perfeito */
        .text-adaptive-title {
            transition: color 0.8s ease;
        }
        .bg-lamp-off .text-adaptive-title { color: #f8fafc; }
        .bg-lamp-on .text-adaptive-title { color: #0f172a; }

        .text-adaptive-sub {
            transition: color 0.8s ease;
        }
        .bg-lamp-off .text-adaptive-sub { color: #94a3b8; }
        .bg-lamp-on .text-adaptive-sub { color: #475569; }

        /* Efeito de Brilho Neon para a Lâmpada Acesa */
        .glow-active {
            box-shadow: 0 0 40px 10px rgba(253, 224, 71, 0.6), 
                        0 0 70px 25px rgba(249, 115, 22, 0.4);
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; box-shadow: 0 0 50px 15px rgba(253, 224, 71, 0.7), 0 0 80px 30px rgba(249, 115, 22, 0.5); }
        }

        /* Animação do Status de Sincronização */
        @keyframes pulse-status {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .pulse-anim {
            animation: pulse-status 1.5s infinite ease-in-out;
        }

        /* Estilos para input e modal de configuração */
        input[type="text"] {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: inherit;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            outline: none;
        }
        .bg-lamp-on input[type="text"] {
            background-color: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.15);
            color: #0f172a;
        }
        .bg-lamp-on input[type="text"]:focus {
            background-color: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="bg-lamp-off min-h-screen flex flex-col justify-between p-6 transition-all duration-1000">

    <!-- CABEÇALHO -->
    <header class="w-full max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 pt-4">
        <div class="text-center sm:text-left">
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-adaptive-title">
                Central de Iluminação IoT
            </h1>
            <p class="text-sm font-medium tracking-wide mt-1 text-adaptive-sub uppercase">
                Controle de Hardware — Porta 13
            </p>
        </div>

        <div class="flex items-center gap-3">
            <!-- BOTÃO DE CONFIGURAÇÃO -->
            <button id="btn-config" class="p-2.5 rounded-full bg-slate-900/40 border border-slate-700/30 hover:bg-slate-800/50 transition-all duration-300" title="Configurar Tópico MQTT">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c-.94 1.543.826 3.31 2.37 2.37a1.724 1.724 0 00 2.572 1.065c.426 1.756 2.924 1.756 3.35 0a1.724 1.724 0 002.573-1.066c1.543.94 3.31-.826 2.37-2.37a1.724 1.724 0 001.065-2.572c1.756-.426 1.756-2.924 0-3.35a1.724 1.724 0 00-1.066-2.573c.94-1.543-.826-3.31-2.37-2.37-.996.608-2.296.07-2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>

            <!-- STATUS DE REDE (PILL) -->
            <div id="status-pill" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900/40 border border-slate-700/30 backdrop-blur-md transition-all duration-500">
                <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-amber-400 pulse-anim"></span>
                <span id="status-text" class="text-xs font-semibold uppercase tracking-wider text-slate-200">
                    Sincronizando...
                </span>
            </div>
        </div>
    </header>

    <!-- MODAL DE CONFIGURAÇÃO DO TÓPICO -->
    <div id="config-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900/95 border border-slate-700/50 rounded-2xl p-6 w-full max-w-md shadow-2xl">
            <h2 class="text-lg font-bold text-white mb-4">Configurar Tópico MQTT</h2>
            
            <div class="mb-4">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-2">
                    Tópico de Publicação
                </label>
                <input 
                    id="topic-input" 
                    type="text" 
                    placeholder="esp32/arduino/porta13"
                    class="w-full px-4 py-2.5 rounded-lg text-slate-200 placeholder-slate-500 text-sm"
                />
                <p class="text-xs text-slate-400 mt-2">
                    Digite o novo tópico MQTT para controlar o dispositivo.
                </p>
            </div>

            <div class="flex gap-3">
                <button id="btn-cancel" class="flex-1 py-2.5 rounded-lg bg-slate-700/50 hover:bg-slate-700 text-white font-semibold uppercase text-xs tracking-wider transition-all duration-300">
                    Cancelar
                </button>
                <button id="btn-save-topic" class="flex-1 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold uppercase text-xs tracking-wider transition-all duration-300">
                    Salvar
                </button>
            </div>
        </div>
    </div>

    <!-- ÁREA CENTRAL: SIMULADOR & INTERFACE -->
    <main class="flex-grow flex flex-col items-center justify-center my-8 w-full">
        <div class="w-full max-w-md bg-white/10 dark:bg-slate-900/20 backdrop-blur-xl rounded-3xl p-8 border border-white/20 dark:border-slate-800/30 shadow-2xl flex flex-col items-center justify-center transition-all duration-500">
            
            <!-- PRÉ-VISUALIZAÇÃO DA LÂMPADA / LED VIRTUAL -->
            <div class="relative w-64 h-64 flex flex-col items-center justify-center mb-8">
                <!-- Círculo Base da Lâmpada Levemente Transparente para Conforto Visual -->
                <div id="led-virtual" class="w-40 h-40 rounded-full bg-slate-700/40 border border-white/10 flex items-center justify-center transition-all duration-700 ease-out">
                    <!-- Ícone Vetorial da Lâmpada (Minimalista) -->
                    <svg xmlns="http://www.w3.org/2000/svg" id="lamp-icon" class="w-20 h-20 text-slate-500/60 transition-colors duration-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v3m0 0h.01m-0.01 0H12m0-3a3 3 0 003-3V9a3 3 0 10-6 0v6a3 3 0 003 3zm0-13.5V3m0 3.5a1.5 1.5 0 000 3M12 18a3.5 3.5 0 003.5-3.5H8.5A3.5 3.5 0 0012 18z" />
                    </svg>
                </div>
                <!-- Texto de Feedback de Estado Interno do LED -->
                <span id="led-status-text" class="absolute bottom-0 text-sm font-semibold tracking-wider text-adaptive-sub uppercase mt-4">
                    Dispositivo Inativo
                </span>
            </div>

            <!-- BOTÕES DE AÇÃO -->
            <div class="w-full grid grid-cols-2 gap-4">
                <button id="btn-on" disabled 
                    class="py-4 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-emerald-500/40 border border-emerald-400/20 cursor-not-allowed opacity-40 transition-all duration-300 active:scale-95 focus:outline-none">
                    Ligar
                </button>
                <button id="btn-off" disabled 
                    class="py-4 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-rose-500/40 border border-rose-400/20 cursor-not-allowed opacity-40 transition-all duration-300 active:scale-95 focus:outline-none">
                    Desligar
                </button>
            </div>
            
        </div>
    </main>

    <!-- RODAPÉ -->
    <footer class="w-full text-center pb-4">
        <p class="text-xs text-adaptive-sub opacity-60">
            Node / Tópico: <span id="footer-topic" class="font-mono">esp32/arduino/porta13</span>
        </p>
    </footer>

    <!-- LOGICA DE HARDWARE E CONEXÃO MQTT -->
    <script>
        (function() {
            // --- DOM refs ---
            const bodyEl = document.body;
            const statusPill = document.getElementById("status-pill");
            const statusDot = document.getElementById("status-dot");
            const statusText = document.getElementById("status-text");
            const ledVirtual = document.getElementById("led-virtual");
            const lampIcon = document.getElementById("lamp-icon");
            const ledStatusText = document.getElementById("led-status-text");
            const btnOn = document.getElementById("btn-on");
            const btnOff = document.getElementById("btn-off");
            const configModal = document.getElementById("config-modal");
            const topicInput = document.getElementById("topic-input");
            const footerTopic = document.getElementById("footer-topic");
            const btnConfig = document.getElementById("btn-config");
            const btnCancel = document.getElementById("btn-cancel");
            const btnSaveTopic = document.getElementById("btn-save-topic");

            // --- estado interno ---
            let currentTopic = "esp32/arduino/porta13";
            let client = null;
            let isConnected = false;
            let ledState = 0; // 0 = off, 1 = on

            // --- helpers UI ---
            function setStatus(mode, msg) {
                // mode: 'sync', 'online', 'offline'
                statusDot.className = "w-2.5 h-2.5 rounded-full";
                if (mode === 'sync') {
                    statusDot.classList.add('bg-amber-400', 'pulse-anim');
                    statusText.textContent = msg || 'Sincronizando...';
                    statusText.className = "text-xs font-semibold uppercase tracking-wider text-slate-200";
                    statusPill.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900/40 border border-slate-700/30 backdrop-blur-md transition-all duration-500";
                } else if (mode === 'online') {
                    statusDot.classList.add('bg-emerald-400');
                    statusText.textContent = msg || 'Sistema Online';
                    statusText.className = "text-xs font-semibold uppercase tracking-wider text-emerald-400";
                    statusPill.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-950/30 border border-emerald-500/20 backdrop-blur-md transition-all duration-500";
                } else if (mode === 'offline') {
                    statusDot.classList.add('bg-rose-500');
                    statusText.textContent = msg || 'Desconectado';
                    statusText.className = "text-xs font-semibold uppercase tracking-wider text-rose-500";
                    statusPill.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-rose-950/30 border border-rose-500/20 backdrop-blur-md transition-all duration-500";
                }
            }

            function setButtonsEnabled(enabled) {
                if (enabled) {
                    btnOn.disabled = false;
                    btnOff.disabled = false;
                    btnOn.className = "py-4 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-emerald-600 border border-emerald-500 hover:bg-emerald-500 cursor-pointer shadow-lg shadow-emerald-900/20 transition-all duration-300 active:scale-95 focus:outline-none";
                    btnOff.className = "py-4 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-rose-600 border border-rose-500 hover:bg-rose-500 cursor-pointer shadow-lg shadow-rose-900/20 transition-all duration-300 active:scale-95 focus:outline-none";
                } else {
                    btnOn.disabled = true;
                    btnOff.disabled = true;
                    btnOn.className = "py-4 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-slate-700/40 border border-white/5 cursor-not-allowed opacity-40 transition-all duration-300 active:scale-95 focus:outline-none";
                    btnOff.className = "py-4 rounded-2xl font-semibold uppercase text-xs tracking-widest text-white bg-slate-700/40 border border-white/5 cursor-not-allowed opacity-40 transition-all duration-300 active:scale-95 focus:outline-none";
                }
            }

            function updateLedUI(state) {
                if (state === 1) {
                    bodyEl.className = "bg-lamp-on min-h-screen flex flex-col justify-between p-6 transition-all duration-1000";
                    ledVirtual.className = "w-40 h-40 rounded-full bg-yellow-300 flex items-center justify-center glow-active transition-all duration-700 ease-out";
                    lampIcon.setAttribute("class", "w-20 h-20 text-orange-500 transition-colors duration-700");
                    ledStatusText.innerText = "Dispositivo Ativo";
                } else {
                    bodyEl.className = "bg-lamp-off min-h-screen flex flex-col justify-between p-6 transition-all duration-1000";
                    ledVirtual.className = "w-40 h-40 rounded-full bg-slate-700/40 border border-white/10 flex items-center justify-center transition-all duration-700 ease-out";
                    lampIcon.setAttribute("class", "w-20 h-20 text-slate-500/60 transition-colors duration-700");
                    ledStatusText.innerText = "Dispositivo Inativo";
                }
            }

            // --- MQTT lógica ---
            function connectMqtt() {
                if (client) {
                    try { client.disconnect(); } catch (_) {}
                    client = null;
                }

                const clientId = 'web_' + Math.random().toString(16).substring(2, 10) + '_' + Date.now().toString(36);
                const broker = 'broker.hivemq.com';
                const port = 8884;
                
                client = new Paho.MQTT.Client(broker, port, clientId);
                client.useSSL = true;

                const onConnect = () => {
                    isConnected = true;
                    setStatus('online', 'Sistema Online');
                    setButtonsEnabled(true);
                    // inscreve no tópico atual
                    const topic = currentTopic;
                    if (topic && topic.length > 0) {
                        client.subscribe(topic, { qos: 0 });
                        console.log('[MQTT] inscrito em:', topic);
                    }
                };

                const onFailure = (err) => {
                    isConnected = false;
                    setStatus('offline', 'Falha na conexão');
                    setButtonsEnabled(false);
                    console.warn('[MQTT] erro conexão:', err);
                    // tenta reconectar após 5s
                    setTimeout(() => {
                        if (!isConnected) {
                            connectMqtt();
                        }
                    }, 5000);
                };

                const onMessageArrived = (message) => {
                    const payload = message.payloadString.trim();
                    const topic = message.destinationName;
                    console.log(`[MQTT] mensagem em ${topic}:`, payload);

                    // só atualiza se for o tópico atual
                    if (topic === currentTopic) {
                        if (payload === '1') {
                            ledState = 1;
                            updateLedUI(1);
                        } else if (payload === '0') {
                            ledState = 0;
                            updateLedUI(0);
                        }
                    }
                };

                client.onConnectionLost = (response) => {
                    isConnected = false;
                    setStatus('offline', 'Conexão perdida');
                    setButtonsEnabled(false);
                    console.warn('[MQTT] conexão perdida', response);
                    // tenta reconectar
                    setTimeout(() => {
                        if (!isConnected) {
                            connectMqtt();
                        }
                    }, 4000);
                };

                client.onMessageArrived = onMessageArrived;

                const options = {
                    timeout: 10,
                    onSuccess: onConnect,
                    onFailure: onFailure,
                    useSSL: true,
                };

                client.connect(options);
            }

            // --- desinscrever e assinar novo tópico ---
            function switchTopic(newTopic) {
                if (!client || !isConnected) return;
                if (!newTopic || newTopic.length === 0) return;

                // desinscreve do antigo se existir
                const oldTopic = currentTopic;
                if (oldTopic && oldTopic.length > 0 && oldTopic !== newTopic) {
                    try {
                        client.unsubscribe(oldTopic, { qos: 0 });
                        console.log('[MQTT] desinscrito de:', oldTopic);
                    } catch (e) {
                        console.warn('[MQTT] erro ao desinscrever', e);
                    }
                }

                // inscreve no novo
                try {
                    client.subscribe(newTopic, { qos: 0 });
                    console.log('[MQTT] inscrito em:', newTopic);
                    currentTopic = newTopic;
                    footerTopic.innerText = newTopic;
                } catch (e) {
                    console.warn('[MQTT] erro ao inscrever', e);
                }
            }

            // --- publicar comando ---
            function publishCommand(value) {
                if (!client || !isConnected) {
                    console.warn('[MQTT] não conectado');
                    return;
                }
                const topic = currentTopic;
                if (!topic || topic.length === 0) {
                    console.warn('[MQTT] tópico inválido');
                    return;
                }
                const msg = new Paho.MQTT.Message(String(value));
                msg.destinationName = topic;
                msg.qos = 0;
                client.send(msg);
                console.log(`[MQTT] publicado '${value}' em ${topic}`);
            }

            // --- EVENT LISTENERS DO MODAL DE CONFIGURAÇÃO ---
            btnConfig.addEventListener('click', () => {
                topicInput.value = currentTopic;
                configModal.classList.remove('hidden');
                topicInput.focus();
            });

            btnCancel.addEventListener('click', () => {
                configModal.classList.add('hidden');
            });

            function saveTopic() {
                const newTopic = topicInput.value.trim();
                
                if (!newTopic) {
                    alert("Por favor, digite um tópico válido.");
                    return;
                }

                if (newTopic === currentTopic) {
                    configModal.classList.add('hidden');
                    return;
                }

                // se conectado, faz a troca
                if (isConnected && client) {
                    switchTopic(newTopic);
                } else {
                    // apenas atualiza a referência para quando conectar
                    currentTopic = newTopic;
                    footerTopic.innerText = newTopic;
                }

                configModal.classList.add('hidden');
                console.log(`Tópico atualizado para: ${currentTopic}`);
            }

            btnSaveTopic.addEventListener('click', saveTopic);
            topicInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveTopic();
            });

            configModal.addEventListener('click', (e) => {
                if (e.target === configModal) {
                    configModal.classList.add('hidden');
                }
            });

            // --- eventos dos botões de ação ---
            btnOn.addEventListener('click', () => publishCommand("1"));
            btnOff.addEventListener('click', () => publishCommand("0"));

            // --- inicialização ---
            function init() {
                // seta estado inicial
                setStatus('sync', 'Sincronizando...');
                setButtonsEnabled(false);
                updateLedUI(0);
                ledState = 0;
                footerTopic.innerText = currentTopic;

                // conecta MQTT
                connectMqtt();
            }

            // inicia
            init();

            // expor para debug (opcional)
            window.__iot = { client, connectMqtt, publishCommand, currentTopic };
        })();
    </script>
</body>
</html>
